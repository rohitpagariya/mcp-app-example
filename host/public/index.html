<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Chat — MCP Apps demo</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <div class="rail-icon active" title="Chat">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 5a2 2 0 012-2h10a2 2 0 012 2v6a2 2 0 01-2 2H9l-4 3V5z"/></svg>
      </div>
      <div class="rail-icon" title="Teams">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="3"/><circle cx="14" cy="9" r="2.5"/><path d="M2 17c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5M11 17c0-1.8 1.3-3.2 3-3.2s3 1.4 3 3.2"/></svg>
      </div>
      <div class="rail-icon" title="Calendar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14M7 3v3M13 3v3"/></svg>
      </div>
    </aside>

    <section class="chat-pane">
      <header class="chat-header">
        <div class="recipient">
          <span class="avatar" style="background:#5B5FC7">C</span>
          <div>
            <div class="name">Copilot</div>
            <div class="presence">Available</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" title="Video call">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="10" height="8" rx="1.5"/><path d="M13 9l4-2v6l-4-2z"/></svg>
          </button>
          <button class="icon-btn" title="Call">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4a2 2 0 012-2h1l2 4-2 1a8 8 0 004 4l1-2 4 2v1a2 2 0 01-2 2C9 14 4 9 4 4z"/></svg>
          </button>
        </div>
      </header>

      <div id="message-list" class="message-list" role="log" aria-live="polite"></div>

      <form id="composer" class="composer" autocomplete="off">
        <input
          id="composer-input"
          class="composer-input"
          type="text"
          placeholder="Type a message"
          autofocus
        />
        <button type="submit" class="composer-send" title="Send">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 10l14-6-6 14-2-6-6-2z"/>
          </svg>
        </button>
      </form>
    </section>

    <aside class="debug-pane" aria-label="Debug timeline">
      <div class="debug-pane-header">
        <div>
          <div class="debug-title">Bridge Timeline</div>
          <div class="debug-subtitle">Host, MCP App, and tool proxy events</div>
        </div>
        <button id="debug-clear" class="debug-clear-btn" type="button">Clear</button>
      </div>

      <div class="debug-pane-summary">
        <span id="debug-count" class="debug-count">0 events</span>
      </div>

      <ol id="debug-timeline" class="debug-timeline" aria-live="polite"></ol>
    </aside>
  </div>

  <script type="module" src="/chat.js"></script>
</body>
</html>
